services:
  - type: web
    name: cinetrack-backend
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /api/movies/genres
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cinetrack-db
          property: connectionString
      - key: TMDB_API_KEY
        sync: false

databases:
  - name: cinetrack-db
    plan: free
    region: frankfurt
    databaseName: cinetrack
    user: cinetrack
    postgresMajorVersion: "17"
