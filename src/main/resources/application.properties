spring.application.name=CineTrack
server.port=${PORT:8080}
spring.datasource.url=${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/cinetrackdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
tmdb.api.key=${TMDB_API_KEY:}
